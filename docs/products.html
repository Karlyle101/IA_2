<head>
  <meta charset="UTF-8" />

  <title>Products | TechNest</title>
  <!-- IA#2 â€” External stylesheet -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- IA#2 â€” Navigation -->
  <nav aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" id="logo">TechNest ðŸ›’</a>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html" class="active">Products</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li>
          <a href="cart.html" class="cart-link" aria-label="Shopping cart">
            ðŸ›’ Cart
            <span class="cart-badge" id="cart-badge" aria-live="polite">0</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="section" aria-labelledby="products-heading">
      <div class="container">
        <p class="section-label">Shop</p>
        <h1 id="products-heading">All Products</h1>

        <!-- IA#2 â€” Filter controls (event listeners attached in JS) -->
        <div class="flex-row mb-1" style="margin-top:1.5rem;" role="search">

          <div class="form-group" style="flex:1; min-width:200px; margin-bottom:0;">
            <label for="search-input">Search products</label>
            <input
              type="search"
              id="search-input"
              placeholder="e.g. keyboard, earbudsâ€¦"
              aria-label="Search products"
              oninput="filterProducts()"
            />
          </div>

          <div class="form-group" style="min-width:160px; margin-bottom:0;">
            <label for="cat-filter">Category</label>
            <select id="cat-filter" aria-label="Filter by category" onchange="filterProducts()">
              <option value="all">All Categories</option>
              <option value="Audio">Audio</option>
              <option value="Peripherals">Peripherals</option>
              <option value="Accessories">Accessories</option>
              <option value="Storage">Storage</option>
            </select>
          </div>

        </div>

        <!-- IA#2 â€” DOM target: renderProducts() writes here -->
        <div class="grid-3 mt-2" id="product-grid" aria-live="polite"></div>

      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>

      </p>
      <p>Designed &amp; Built by Karlyle Ambursley &bull; 2111685 &bull; CIT2011 Web Programming</p>
    </div>
  </footer>

  <!-- IA#2 â€” External JS -->
  <script src="./script.js"></script>
  <script>
    /* IA#2 â€” Initial render of all products on page load */
    renderProducts(PRODUCTS);

    /* IA#2 â€” Event listener: search input live filter */
    document.getElementById("search-input").addEventListener("input", filterProducts);

    /* IA#2 â€” Event listener: category dropdown filter */
    document.getElementById("cat-filter").addEventListener("change", filterProducts);
  </script>

</body>
</html>
